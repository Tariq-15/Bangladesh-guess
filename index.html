<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Globle-style guessing game for the 64 districts of Bangladesh. Bilingual (Bangla/English), practice mode, unlimited games.">
<title>Bangladesh Guesser — জেলাখুঁজি</title>
<style>
/* ---------- design tokens ---------- */
:root {
  --bg: #ECEDF0;
  --dot: rgba(255, 255, 255, .75);
  --surface: #FEFDF9;
  --surface-2: #F4F1E6;
  --line: #2A2722;
  --ink: #26221D;
  --ink-2: #6A655C;
  --ink-3: #9B9585;
  --accent: #53B5A9;
  --accent-hi: #3FA093;
  --on-accent: #1E241D;
  --green: #A9D473;
  --green-hi: #97C95E;
  --yellow: #F5D442;
  --lav: #E7E1F6;
  --mint: #E3F0D6;
  --water: #DCEDE6;
  --land: #F7F0DC;
  --land-line: #7E786A;
  --found: #35A78D;
  --heat0: #F9F0B8;
  --heat1: #F5C75F;
  --heat2: #EA8A33;
  --heat3: #D1451E;
  --heat4: #8C0F0C;
  --warn: #9A6A14;
  --error: #AE3A2E;
  --pop: 6px 7px 0 -1.5px var(--surface), 6px 7px 0 0 var(--line);
  --pop-sm: 3px 3.5px 0 -1.5px var(--surface), 3px 3.5px 0 0 var(--line);
  --radius: 18px;
  --font-ui: "Segoe UI Variable Text", "Segoe UI", system-ui, "Noto Sans Bengali", "Nirmala UI", "Kohinoor Bangla", "Hind Siliguri", "Bangla MN", sans-serif;
  --font-display: "Segoe UI Variable Display", "Segoe UI", system-ui, "Noto Sans Bengali", "Nirmala UI", "Kohinoor Bangla", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16181B;
    --dot: rgba(255, 255, 255, .05);
    --surface: #202327;
    --surface-2: #292D32;
    --line: #E9E4D7;
    --ink: #EDE9DE;
    --ink-2: #ACA79A;
    --ink-3: #7D796D;
    --accent: #58C2B4;
    --accent-hi: #6FD3C5;
    --on-accent: #171B14;
    --green: #9FCB6F;
    --green-hi: #AFDA81;
    --yellow: #E4C43D;
    --lav: #3E3A54;
    --mint: #36432F;
    --water: #182320;
    --land: #272B24;
    --land-line: #8F8A7B;
    --found: #3FB598;
    --heat0: #383120;
    --heat1: #6C4A1E;
    --heat2: #A65B1D;
    --heat3: #E25326;
    --heat4: #FF7A45;
    --warn: #D9A24C;
    --error: #E06A57;
  }
}
:root[data-theme="dark"] {
  --bg: #16181B;
  --dot: rgba(255, 255, 255, .05);
  --surface: #202327;
  --surface-2: #292D32;
  --line: #E9E4D7;
  --ink: #EDE9DE;
  --ink-2: #ACA79A;
  --ink-3: #7D796D;
  --accent: #58C2B4;
  --accent-hi: #6FD3C5;
  --on-accent: #171B14;
  --green: #9FCB6F;
  --green-hi: #AFDA81;
  --yellow: #E4C43D;
  --lav: #3E3A54;
  --mint: #36432F;
  --water: #182320;
  --land: #272B24;
  --land-line: #8F8A7B;
  --found: #3FB598;
  --heat0: #383120;
  --heat1: #6C4A1E;
  --heat2: #A65B1D;
  --heat3: #E25326;
  --heat4: #FF7A45;
  --warn: #D9A24C;
  --error: #E06A57;
}
:root[data-theme="light"] {
  --bg: #ECEDF0;
  --dot: rgba(255, 255, 255, .75);
  --surface: #FEFDF9;
  --surface-2: #F4F1E6;
  --line: #2A2722;
  --ink: #26221D;
  --ink-2: #6A655C;
  --ink-3: #9B9585;
  --accent: #53B5A9;
  --accent-hi: #3FA093;
  --on-accent: #1E241D;
  --green: #A9D473;
  --green-hi: #97C95E;
  --yellow: #F5D442;
  --lav: #E7E1F6;
  --mint: #E3F0D6;
  --water: #DCEDE6;
  --land: #F7F0DC;
  --land-line: #7E786A;
  --found: #35A78D;
  --heat0: #F9F0B8;
  --heat1: #F5C75F;
  --heat2: #EA8A33;
  --heat3: #D1451E;
  --heat4: #8C0F0C;
  --warn: #9A6A14;
  --error: #AE3A2E;
}

/* ---------- base ---------- */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background-color: var(--bg);
  background-image:
    radial-gradient(circle at 4% 7%, var(--dot) 30px, transparent 31px),
    radial-gradient(circle at 97% 12%, var(--dot) 46px, transparent 47px),
    radial-gradient(circle at 10% 90%, var(--dot) 38px, transparent 39px),
    radial-gradient(circle at 88% 80%, var(--dot) 26px, transparent 27px),
    radial-gradient(circle at 55% 3%, var(--dot) 14px, transparent 15px),
    radial-gradient(circle at 74% 46%, var(--dot) 19px, transparent 20px),
    radial-gradient(circle at 30% 42%, var(--dot) 11px, transparent 12px);
  background-attachment: fixed;
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.45;
  min-height: 100vh;
}
.app {
  max-width: 1180px;
  margin: 0 auto;
  padding: 14px 18px 26px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
button { font-family: inherit; cursor: pointer; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

/* ---------- header ---------- */
header.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 13px; min-width: 0; }
.brand .flag {
  flex: none;
  width: 42px;
  height: 42px;
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 13px;
  box-shadow: 2.5px 3px 0 0 var(--line);
}
.brand h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: .01em;
  line-height: 1.15;
  text-wrap: balance;
  text-decoration: underline;
  text-decoration-color: var(--yellow);
  text-decoration-thickness: 9px;
  text-decoration-skip-ink: none;
  text-underline-offset: -5px;
}
.brand .tag { margin: 0; font-size: 12.5px; font-weight: 600; color: var(--accent-hi); }
.controls { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }

.seg {
  display: flex;
  border: 1.5px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  padding: 3px;
  box-shadow: 2px 2.5px 0 0 var(--line);
}
.seg button {
  flex: 1;
  border: 0;
  background: transparent;
  color: var(--ink-2);
  font-size: 12.5px;
  font-weight: 700;
  padding: 6px 10px;
  border-radius: 999px;
  transition: background .15s;
}
.seg button[aria-pressed="true"] { background: var(--accent); color: var(--on-accent); }
.seg-desc { margin: -3px 4px 0; font-size: 11.5px; line-height: 1.45; color: var(--ink-2); }

.btn {
  border: 1.5px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  font-size: 13.5px;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 999px;
  box-shadow: 2px 2.5px 0 0 var(--line);
  transition: background .15s, transform .1s, box-shadow .1s;
}
.btn:hover { background: var(--surface-2); }
.btn:active { transform: translate(1.5px, 2px); box-shadow: 0 0 0 0 var(--line); }
.btn.primary { background: var(--green); color: var(--on-accent); }
.btn.primary:hover { background: var(--green-hi); }
.btn.icon { padding: 9px 10px; line-height: 0; }
.btn.icon svg { width: 16px; height: 16px; }
.btn.ghost { background: transparent; border-style: dashed; box-shadow: none; }
.btn.ghost:hover { background: var(--surface); }
.btn.ghost:active { transform: none; }
.btn:disabled { opacity: .4; cursor: default; box-shadow: none; transform: none; }
.btn:disabled:hover { background: var(--surface); }

/* ---------- layout ---------- */
main {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 375px;
  gap: 16px;
  align-items: start;
}
@media (max-width: 920px) {
  main { grid-template-columns: 1fr; }
}

/* ---------- map card ---------- */
.map-card {
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--pop);
  overflow: hidden;
}
.map-wrap { position: relative; background: var(--water); }
.map-wrap svg { display: block; width: 100%; height: auto; max-height: 78vh; }
.dist {
  fill: var(--land);
  stroke: var(--land-line);
  stroke-width: .85;
  stroke-linejoin: round;
  transition: fill .5s;
}
.dist.hit { stroke: color-mix(in srgb, var(--line) 72%, transparent); stroke-width: 1; cursor: help; }
.dist.won { fill: var(--found); stroke: var(--line); }
@keyframes wonPulse {
  0%, 100% { fill-opacity: 1; }
  50% { fill-opacity: .55; }
}
.dist.won.pulse { animation: wonPulse 1.1s ease-in-out 3; }
@media (prefers-reduced-motion: reduce) {
  .dist { transition: none; }
  .dist.won.pulse { animation: none; }
}
.map-label {
  fill: color-mix(in srgb, var(--ink-2) 72%, var(--water));
  font-family: var(--font-ui);
  font-style: italic;
  letter-spacing: .14em;
  font-size: 13px;
}
.map-deco { stroke: var(--ink-3); fill: var(--ink-3); }
.map-deco text { font-family: var(--font-display); font-style: normal; letter-spacing: 0; fill: var(--ink-2); }

.tip {
  position: absolute;
  pointer-events: none;
  background: var(--surface);
  color: var(--ink);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  box-shadow: var(--pop-sm);
  padding: 5px 10px;
  font-size: 12.5px;
  white-space: nowrap;
  z-index: 4;
  display: none;
}
.tip .km { font-family: var(--font-display); font-weight: 700; font-variant-numeric: tabular-nums; }

.map-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  flex-wrap: wrap;
  padding: 10px 14px;
  border-top: 1.5px dashed color-mix(in srgb, var(--line) 55%, transparent);
  background: var(--surface);
}
.legend { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--ink-2); }
.legend .bar {
  width: 130px;
  height: 11px;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--heat0), var(--heat1), var(--heat2), var(--heat3), var(--heat4));
  border: 1px solid color-mix(in srgb, var(--line) 55%, transparent);
}
.legend .chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.legend .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--found); border: 1px solid color-mix(in srgb, var(--line) 55%, transparent); }

/* ---------- side panel ---------- */
.panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--pop);
  padding: 15px;
}
.combo { position: relative; display: flex; gap: 8px; }
.combo input {
  flex: 1;
  min-width: 0;
  font-family: var(--font-ui);
  font-size: 15px;
  color: var(--ink);
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 12px;
  padding: 10px 13px;
  transition: box-shadow .15s, border-color .15s;
}
.combo input:focus { border-color: var(--accent-hi); outline: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 30%, transparent); }
.combo input::placeholder { color: var(--ink-3); }

.suggest {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  margin: 0;
  padding: 5px;
  list-style: none;
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 14px;
  box-shadow: var(--pop-sm);
  z-index: 9;
  max-height: 262px;
  overflow-y: auto;
}
.suggest[hidden] { display: none; }
.suggest li {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  padding: 8px 11px;
  border-radius: 9px;
  cursor: pointer;
}
.suggest li .alt { color: var(--ink-3); font-size: 12.5px; }
.suggest li[aria-selected="true"], .suggest li:hover { background: color-mix(in srgb, var(--accent) 22%, var(--surface)); }

.msg { min-height: 20px; font-size: 13px; color: var(--ink-2); }
.msg.warn { color: var(--warn); }
.msg.error { color: var(--error); }
.msg.good { color: var(--found); font-weight: 600; }
.msg.cool { color: var(--accent-hi); font-weight: 600; }

.stats { display: flex; align-items: stretch; gap: 9px; }
.stat {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--surface-2);
  border: 1.5px solid var(--line);
  border-radius: 13px;
  padding: 6px 13px;
  min-width: 0;
  box-shadow: var(--pop-sm);
}
.stat:nth-child(1) { background: var(--lav); }
.stat:nth-child(2) { background: var(--mint); }
.stat .k { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-2); }
.stat .v {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}
.stat .v small { font-size: 11px; font-weight: 600; color: var(--ink-2); }

.actions { display: flex; gap: 9px; }
.actions .btn {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.actions .btn svg { width: 15px; height: 15px; flex: none; }

/* ---------- guess list ---------- */
.guesses {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  max-height: 46vh;
}
@media (max-width: 920px) { .guesses { max-height: none; } }
.row {
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr) 20px auto;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border-radius: 12px;
  border: 1.5px solid color-mix(in srgb, var(--line) 65%, var(--heat, var(--line)));
  background: color-mix(in srgb, var(--heat, var(--surface)) 38%, var(--surface));
}
@keyframes rowIn { from { transform: translateY(-4px); opacity: 0; } to { transform: none; opacity: 1; } }
.row.new { animation: rowIn .3s ease-out; }
@media (prefers-reduced-motion: reduce) { .row.new { animation: none; } }
.row .swatch { width: 16px; height: 16px; border-radius: 50%; background: var(--heat, var(--land)); border: 1.5px dashed color-mix(in srgb, var(--line) 80%, transparent); }
.row.target .swatch { background: var(--found); border-style: solid; }
.row .names { display: flex; flex-direction: column; min-width: 0; }
.row .n1 { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row .n2 { font-size: 11.5px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row .dir { line-height: 0; color: var(--ink-2); }
.row .dir svg { width: 15px; height: 15px; fill: currentColor; }
.row.target .dir { color: var(--found); font-weight: 700; }
.row .km {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  text-align: right;
}
.row .km small { font-size: 10.5px; font-weight: 600; color: var(--ink-2); }

/* ---------- win banner ---------- */
.banner[hidden] { display: none; }
.banner {
  border: 1.5px solid var(--line);
  background: color-mix(in srgb, var(--found) 13%, var(--surface));
  border-radius: 15px;
  box-shadow: var(--pop-sm);
  padding: 13px 15px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
@keyframes bannerIn { from { transform: scale(.97); opacity: 0; } to { transform: none; opacity: 1; } }
.banner { animation: bannerIn .25s ease-out; }
@media (prefers-reduced-motion: reduce) { .banner { animation: none; } }
.banner .kicker {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--found);
}
.banner .name { font-family: var(--font-display); font-size: 21px; font-weight: 700; line-height: 1.2; }
.banner .sub { font-size: 13px; color: var(--ink-2); }
.banner .btn { margin-top: 7px; align-self: flex-start; }

/* ---------- footer ---------- */
footer {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 11.5px;
  color: var(--ink-3);
}
footer a { color: inherit; }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <svg class="flag" viewBox="0 0 40 40" aria-hidden="true">
        <rect width="40" height="40" rx="10" fill="#006A4E"/>
        <circle cx="18" cy="20" r="9.5" fill="#F42A41"/>
      </svg>
      <div>
        <h1 id="t-title">Bangladesh Guesser</h1>
        <p class="tag" id="t-tag">Find the hidden district</p>
      </div>
    </div>
    <div class="controls">
      <button type="button" class="btn icon" id="btn-theme" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path class="ico-moon" d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
          <g class="ico-sun" style="display:none">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
          </g>
        </svg>
      </button>
      <button type="button" class="btn primary" id="btn-new">New game</button>
    </div>
  </header>

  <main>
    <section class="map-card" aria-label="Map of Bangladesh">
      <div class="map-wrap">
        <svg id="map" role="img" aria-label="Districts of Bangladesh"></svg>
        <div class="tip" id="tip"></div>
      </div>
      <div class="map-foot">
        <div class="legend">
          <span id="t-far">Far</span>
          <span class="bar" aria-hidden="true"></span>
          <span id="t-close">Close</span>
        </div>
        <div class="legend">
          <span class="chip"><span class="dot" aria-hidden="true"></span><span id="t-found">Found</span></span>
        </div>
      </div>
    </section>

    <aside class="panel" aria-label="Guessing panel">
      <div class="seg" role="group" aria-label="Difficulty level">
        <button type="button" id="lv-rookie" aria-pressed="false">Rookie</button>
        <button type="button" id="lv-novice" aria-pressed="false">Novice</button>
        <button type="button" id="lv-expert" aria-pressed="true">Expert</button>
      </div>
      <p class="seg-desc" id="lv-desc"></p>

      <div class="banner" id="banner" hidden>
        <span class="kicker" id="banner-kicker"></span>
        <span class="name" id="banner-name"></span>
        <span class="sub" id="banner-sub"></span>
        <button type="button" class="btn primary" id="btn-again">Play again</button>
      </div>

      <form id="guess-form" autocomplete="off">
        <div class="combo">
          <input id="guess-input" type="text" spellcheck="false"
                 role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="suggest"
                 placeholder="Type a district name…">
          <button type="submit" class="btn primary" id="btn-guess">Guess</button>
          <ul class="suggest" id="suggest" role="listbox" hidden></ul>
        </div>
      </form>

      <div class="msg" id="msg" aria-live="polite"></div>

      <div class="stats">
        <div class="stat"><span class="k" id="t-guesses">Guesses</span><span class="v" id="stat-n">0</span></div>
        <div class="stat"><span class="k" id="t-closest">Closest</span><span class="v" id="stat-close">—</span></div>
      </div>

      <div class="actions">
        <button type="button" class="btn" id="btn-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4.2 10.3c.7.6 1.2 1.6 1.2 2.7h6c0-1.1.5-2.1 1.2-2.7A6 6 0 0 0 12 3Z"/></svg>
          <span id="t-hint">Hint</span>
        </button>
        <button type="button" class="btn" id="btn-reveal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 21V4"/><path d="M5 5c4-2.2 6 2.2 10 0v8c-4 2.2-6-2.2-10 0"/></svg>
          <span id="t-giveup">Give up</span>
        </button>
      </div>

      <ol class="guesses" id="guesses"></ol>
    </aside>

    if (Math.abs(a.length - b.length) > cap) return cap + 1;
    const m = a.length, n = b.length;
    let prev = new Array(n + 1), cur = new Array(n + 1);
    for (let j = 0; j <= n; j++) prev[j] = j;
    for (let i = 1; i <= m; i++) {
      cur[0] = i;
      let rowMin = i;
      for (let j = 1; j <= n; j++) {

  function rank(qRaw) {
    const q = normalize(qRaw);

    const cap = capFor(q);

    for (const [k, i] of KEYS) {

      else if (k.startsWith(q)) s = 0.5;

        rookie: "সহজ — দূরত্ব, দিকনির্দেশ তীর ও ইঙ্গিত দেখায়।",
        novice: "মাঝারি — শুধু দূরত্ব দেখায়, দিকনির্দেশ তীর নেই।",
        expert: "কঠিন — শুধু রঙের আভাস: দূরত্ব, দিক বা ইঙ্গিত নেই।",
      },
      copyResult: "ফলাফল কপি",
      copied: "কপি হয়েছে!",
      downloadCard: "কার্ড ডাউনলোড",
      shareWin: (name, n, lv) => `🇧🇩 জেলাখুঁজি — ${bnNum(n)} বার অনুমানে ${name} পাওয়া গেছে (${lv})`,
      shareLose: (name, n, lv) => `🇧🇩 জেলাখুঁজি — ${bnNum(n)} বার চেষ্টা করেও ${name} পাইনি (${lv})`,
      already: (name) => `${name} আগেই অনুমান করেছেন।`,
      none: (q) => `“${q}” নামে কোনো জেলা নেই।`,
      didYouMean: "আপনি কি এগুলোর কোনোটি বোঝাতে চেয়েছেন?",
      accepted: (name) => `${name} ধরে নেওয়া হলো।`,
      neighbor: "একদম পাশের জেলা!",
      warmer: (name) => `${name} — আগের চেয়ে গরম 🔥`,
      cooler: (name) => `${name} — আগের চেয়ে ঠান্ডা ❄️`,
      sameTemp: (name) => `${name} — একই দূরত্বে।`,
      themeLabel: "থিম বদলান",
      practice: "অনুশীলন মোড — যত খুশি খেলুন · Globle-অনুপ্রাণিত",
      credit: "সীমানা: geoBoundaries · বাংলাদেশ পরিসংখ্যান ব্যুরো",
      mapAria: "বাংলাদেশের জেলার মানচিত্র",
      bay: "বঙ্গোপসাগর",
      north: "উ",
      scale: "১০০ কিমি",
      div: (dv) => D.divBn[dv] || dv,
    },
  };

  /* ================= dom refs ================= */
  const $ = (id) => document.getElementById(id);
  const elMap = $("map"), elTip = $("tip"), elMsg = $("msg"), elList = $("guesses"),
    elInput = $("guess-input"), elSuggest = $("suggest"), elForm = $("guess-form"),
    elBanner = $("banner"), elStatN = $("stat-n"), elStatClose = $("stat-close");

  /* ================= prefs ================= */
  const store = {
    get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
  };
  let lang = "en";
  const T = () => I18N[lang];

  /* difficulty: what feedback each level reveals while playing */
  const LEVELS = {
    rookie: { km: true, dir: true, hints: true },
    novice: { km: true, dir: false, hints: true },
    expert: { km: false, dir: false, hints: false },
  };
  let level = LEVELS[store.get("bgg-level")] ? store.get("bgg-level") : "expert";
  const LV = () => LEVELS[level];

  function currentTheme() {
    const attr = document.documentElement.getAttribute("data-theme");
    if (attr === "dark" || attr === "light") return attr;
    return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  (function initTheme() {
    const saved = store.get("bgg-theme");
    if (saved === "dark" || saved === "light") document.documentElement.setAttribute("data-theme", saved);
  })();

  function heatStops() {
    const cs = getComputedStyle(document.documentElement);
    return [0, 1, 2, 3, 4].map((i) => cs.getPropertyValue("--heat" + i).trim());
  }

  /* ================= map ================= */
  const PAD = 16, VW = 640;
  let VH = 800, pxPerKm = 1;
  const SVGNS = "http://www.w3.org/2000/svg";
  const paths = [];

  function buildMap() {
    let minLon = Infinity, maxLon = -Infinity, minLat = Infinity, maxLat = -Infinity;
    for (const d of D.districts)
      for (const ring of d.polys)
        for (const [lon, lat] of ring) {
          if (lon < minLon) minLon = lon;
          if (lon > maxLon) maxLon = lon;
          if (lat < minLat) minLat = lat;
          if (lat > maxLat) maxLat = lat;
        }
    const wKm = (maxLon - minLon) * KX, hKm = (maxLat - minLat) * KY;
    const s = (VW - 2 * PAD) / wKm;
    pxPerKm = s;
    VH = Math.round(hKm * s + 2 * PAD);
    elMap.setAttribute("viewBox", `0 0 ${VW} ${VH}`);

    const px = (lon) => PAD + (lon - minLon) * KX * s;
    const py = (lat) => PAD + (maxLat - lat) * KY * s;

    D.districts.forEach(function (d, i) {
      let dstr = "";
      for (const ring of d.polys) {
        dstr += ring.map(([lon, lat], k) =>
          (k ? "L" : "M") + px(lon).toFixed(1) + " " + py(lat).toFixed(1)).join("") + "Z";
      }
      const p = document.createElementNS(SVGNS, "path");
      p.setAttribute("d", dstr);
      p.setAttribute("class", "dist");
      p.setAttribute("fill-rule", "evenodd");
      p.dataset.i = i;
      elMap.appendChild(p);
      paths.push(p);
    });

    // Bay of Bengal label
    const bay = document.createElementNS(SVGNS, "text");
    bay.setAttribute("x", VW * 0.40);
    bay.setAttribute("y", VH - 26);
    bay.setAttribute("class", "map-label");
    bay.id = "bay-label";
    elMap.appendChild(bay);

    // north arrow + scale bar (bottom-right)
    const deco = document.createElementNS(SVGNS, "g");
    deco.setAttribute("class", "map-deco");
    const nx = VW - 34, ny = VH - 88;
    const scaleW = 100 * pxPerKm, sx = VW - 30 - scaleW, sy = VH - 30;
    deco.innerHTML =
      `<path d="M${nx} ${ny} l7 18 l-7 -5 l-7 5 Z"></path>` +
      `<text id="north-label" x="${nx}" y="${ny + 32}" text-anchor="middle" font-size="11"></text>` +
      `<path d="M${sx} ${sy} v4 v-4 h${scaleW} v4" fill="none" stroke-width="1.4"></path>` +
      `<text id="scale-label" x="${sx + scaleW / 2}" y="${sy - 6}" text-anchor="middle" font-size="10.5"></text>`;
    elMap.appendChild(deco);
  }

  /* ================= game state ================= */
  const NUM = D.n;
  let target = -1, guesses = [], done = false, revealed = false, hintCount = 0;
  let lastMsg = null; // {kind, key, args} re-renderable on language switch

  function newGame() {
    let t;
    do { t = Math.floor(Math.random() * NUM); } while (t === target && NUM > 1);
    target = t;
    guesses = [];
    done = false; revealed = false; hintCount = 0;
    lastMsg = null;
    elBanner.hidden = true;
    $("btn-hint").disabled = !LV().hints;
    $("btn-reveal").disabled = false;
    elInput.disabled = false;
    elInput.value = "";
    closeSuggest();
    paintAll();
    renderList();
    renderStats();
    setMsg(null);
    elInput.focus();
  }

  function kmOf(i) { return pairKm(i, target); }

  /* ================= painting ================= */
  function paintAll() {
    const stops = heatStops();
    paths.forEach(function (p, i) {
      p.classList.remove("hit", "won", "pulse");
      p.style.fill = "";
      if (done && i === target) {
        p.classList.add("hit", "won");
      } else if (guesses.includes(i)) {
        p.classList.add("hit");
        p.style.fill = i === target ? "" : heatColor(kmOf(i), stops, D.maxKm);
      }
    });
    if (done) {
      // keep the found district on top so its pulse reads cleanly
      elMap.insertBefore(paths[target], elMap.querySelector(".map-label"));
    }
  }

  /* ================= rendering ================= */
  const arrowSvg = (deg) =>
    `<svg viewBox="0 0 24 24" aria-hidden="true" style="transform:rotate(${deg}deg)"><path d="M12 2.5 17 12l-4-1.6V21h-2v-10.6L7 12Z"/></svg>`;

  function fmtNum(x) { return lang === "bn" ? bnNum(x) : String(x); }

  function nameOf(i) { const d = D.districts[i]; return lang === "bn" ? d.bn : d.en; }
  function altNameOf(i) { const d = D.districts[i]; return lang === "bn" ? d.en : d.bn; }

  function renderList() {
    elList.innerHTML = "";
    const stops = heatStops();
    const sorted = [...guesses].sort((a, b) => kmOf(a) - kmOf(b));
    const newest = guesses[guesses.length - 1];
    for (const i of sorted) {
      const li = document.createElement("li");
      const km = kmOf(i);
      const isTarget = i === target;
      li.className = "row" + (isTarget ? " target" : "") + (i === newest ? " new" : "");
      if (!isTarget) li.style.setProperty("--heat", heatColor(km, stops, D.maxKm));
      else li.style.setProperty("--heat", "var(--found)");
      // expert/novice hide feedback while playing; everything is revealed once the game ends
      const dir = isTarget ? "✓"
        : (LV().dir || done) ? arrowSvg(bearingDeg(i, target).toFixed(0)) : "";
      const kmCell = isTarget
        ? `<span class="km">${T().found}</span>`
        : (LV().km || done)
          ? `<span class="km">${fmtNum(km)} <small>${T().km}</small></span>`
          : `<span class="km"></span>`;
      li.innerHTML =
        `<span class="swatch" aria-hidden="true"></span>` +
        `<span class="names"><span class="n1">${nameOf(i)}</span><span class="n2">${altNameOf(i)}</span></span>` +
        `<span class="dir" aria-hidden="true">${dir}</span>` + kmCell;
      elList.appendChild(li);
    }
  }

  function renderStats() {
    elStatN.textContent = fmtNum(guesses.length);
    const others = guesses.filter((i) => i !== target);
    if (done && guesses.includes(target)) {
      elStatClose.innerHTML = `${fmtNum(0)} <small>${T().km}</small>`;
    } else if (others.length && (LV().km || done)) {
      const min = Math.min(...others.map(kmOf));
      elStatClose.innerHTML = `${fmtNum(min)} <small>${T().km}</small>`;
    } else {
      elStatClose.textContent = "—";
    }
  }

  function setMsg(msg) {
    lastMsg = msg;
    if (!msg) { elMsg.textContent = ""; elMsg.className = "msg"; return; }
    const t = T();
    const text = typeof t[msg.key] === "function" ? t[msg.key].apply(null, msg.args || []) : t[msg.key];
    elMsg.textContent = text;
    elMsg.className = "msg " + (msg.kind || "");
  }

  function showBanner(kind) {
    const t = T();
    $("banner-kicker").textContent = kind === "win" ? t.winKicker : t.revealKicker;
    $("banner-name").textContent = nameOf(target) + " · " + altNameOf(target);
    $("banner-sub").textContent = kind === "win" ? t.winSub(guesses.length) : t.revealSub;
    $("btn-again").textContent = t.playAgain;
    elBanner.hidden = false;
  }

  function endGame(kind) {
    done = true;
    revealed = kind === "reveal";
    elInput.disabled = true;
    elInput.value = "";
    $("btn-hint").disabled = true;
    $("btn-reveal").disabled = true;
    closeSuggest();
    paintAll();
    const p = paths[target];
    p.classList.add("pulse");
    showBanner(kind);
    renderStats();
    applyLangDynamic(); // refresh placeholder
  }

  /* ================= guessing ================= */
  function makeGuess(i, viaFuzzy) {
    if (done) return;
    if (guesses.includes(i)) {
      setMsg({ kind: "warn", key: "already", args: [nameOf(i)] });
      return;
    }
    guesses.push(i);
    elInput.value = "";
    closeSuggest();
    if (i === target) {
      setMsg(null);
      endGame("win");
    } else {
      const prev = guesses.length >= 2 ? guesses[guesses.length - 2] : -1;
      if (kmOf(i) === 0) setMsg({ kind: "good", key: "neighbor" });
      else if (prev >= 0) {
        const d = kmOf(i) - kmOf(prev);
        if (d < 0) setMsg({ kind: "good", key: "warmer", args: [nameOf(i)] });
        else if (d > 0) setMsg({ kind: "cool", key: "cooler", args: [nameOf(i)] });
        else setMsg({ kind: "", key: "sameTemp", args: [nameOf(i)] });
      } else if (viaFuzzy) setMsg({ kind: "", key: "accepted", args: [nameOf(i)] });
      else setMsg(null);
      paintAll();
    }
    renderList();
    renderStats();
  }

  function onSubmit() {
    const q = elInput.value;
    if (!normalize(q) || done) return;
    // if the user highlighted a suggestion, take it
    if (!elSuggest.hidden && activeIdx >= 0) {
      const el = elSuggest.children[activeIdx];
      if (el) { makeGuess(+el.dataset.i, false); return; }
    }
    const r = resolveInput(q);
    if (r.kind === "exact") makeGuess(r.i, false);
    else if (r.kind === "auto") {
      const wasTyped = normalize(q) === normalize(nameOf(r.i)) || normalize(q) === normalize(altNameOf(r.i));
      makeGuess(r.i, !wasTyped);
    } else if (r.kind === "ambiguous") {
      setMsg({ kind: "warn", key: "didYouMean" });
      openSuggest(r.list.map((c) => c.i));
    } else {
      setMsg({ kind: "error", key: "none", args: [q.trim()] });
      closeSuggest();
    }
  }

  /* ================= suggestions ================= */
  let activeIdx = -1;

  function openSuggest(indices) {
    elSuggest.innerHTML = "";
    activeIdx = -1;
    if (!indices.length) { closeSuggest(); return; }
    indices.forEach(function (i) {
      const li = document.createElement("li");
      li.setAttribute("role", "option");
      li.dataset.i = i;
      li.id = "opt-" + i;
      li.innerHTML = `<span>${nameOf(i)}</span><span class="alt">${altNameOf(i)}</span>`;
      li.addEventListener("pointerdown", function (e) { e.preventDefault(); makeGuess(i, false); });
      elSuggest.appendChild(li);
    });
    elSuggest.hidden = false;
    elInput.setAttribute("aria-expanded", "true");
  }

  function closeSuggest() {
    elSuggest.hidden = true;
    elSuggest.innerHTML = "";
    activeIdx = -1;
    elInput.setAttribute("aria-expanded", "false");
    elInput.removeAttribute("aria-activedescendant");
  }

  function setActive(idx) {
    const items = elSuggest.children;
    if (!items.length) return;
    activeIdx = (idx + items.length) % items.length;
    for (let k = 0; k < items.length; k++)
      items[k].setAttribute("aria-selected", k === activeIdx ? "true" : "false");
    elInput.setAttribute("aria-activedescendant", items[activeIdx].id);
    items[activeIdx].scrollIntoView({ block: "nearest" });
  }

  elInput.addEventListener("input", function () {
    if (done) return;
    setMsg(null);
    const q = elInput.value;
    if (!normalize(q)) { closeSuggest(); return; }
    const list = rank(q).filter((c) => !guesses.includes(c.i)).slice(0, 7);
    openSuggest(list.map((c) => c.i));
  });

  elInput.addEventListener("keydown", function (e) {
    if (elSuggest.hidden) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setActive(activeIdx + 1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setActive(activeIdx - 1); }
    else if (e.key === "Escape") { closeSuggest(); }
  });

  document.addEventListener("pointerdown", function (e) {
    if (!e.target.closest(".combo")) closeSuggest();
  });

  elForm.addEventListener("submit", function (e) { e.preventDefault(); onSubmit(); });

  document.addEventListener("keydown", function (e) {
    if (e.key === "/" && document.activeElement !== elInput) { e.preventDefault(); elInput.focus(); }
  });

  /* ================= tooltip ================= */
  elMap.addEventListener("pointermove", function (e) {
    const t = e.target;
    if (!(t instanceof SVGPathElement) || !t.classList.contains("hit")) { elTip.style.display = "none"; return; }
    const i = +t.dataset.i;
    const km = kmOf(i);
    elTip.innerHTML = i === target
      ? `${nameOf(i)} · <span class="km">✓ ${T().found}</span>`
      : (LV().km || done)
        ? `${nameOf(i)} · <span class="km">${fmtNum(km)} ${T().km}</span>`
        : nameOf(i);
    elTip.style.display = "block";
    const wrap = elMap.parentElement.getBoundingClientRect();
    let x = e.clientX - wrap.left + 14, y = e.clientY - wrap.top + 10;
    const tw = elTip.offsetWidth, th = elTip.offsetHeight;
    if (x + tw > wrap.width - 6) x = e.clientX - wrap.left - tw - 10;
    if (y + th > wrap.height - 6) y = e.clientY - wrap.top - th - 8;
    elTip.style.left = x + "px";
    elTip.style.top = y + "px";
  });
  elMap.addEventListener("pointerleave", function () { elTip.style.display = "none"; });

  /* ================= buttons ================= */
  $("btn-new").addEventListener("click", newGame);
  $("btn-again").addEventListener("click", newGame);

  function applyLevel() {
    for (const lv of Object.keys(LEVELS))
      $("lv-" + lv).setAttribute("aria-pressed", lv === level ? "true" : "false");
    $("lv-desc").textContent = T().lvDesc[level];
  }

  Object.keys(LEVELS).forEach(function (lv) {
    $("lv-" + lv).addEventListener("click", function () {
      if (lv === level) return;
      level = lv;
      store.set("bgg-level", lv);
      applyLevel();
      newGame(); // changing difficulty starts a fresh round
    });
  });

  $("btn-hint").addEventListener("click", function () {
    if (done) return;
    const name = D.districts[target].en;
    const maxLetters = Math.ceil(name.length / 2); // never spell out the full answer
    const dv = T().div(D.districts[target].div);
    if (hintCount === 0) {
      setMsg({ kind: "", key: "hintOut", args: [dv] });
    } else if (hintCount <= maxLetters) {
      setMsg({ kind: "", key: "hintLetters", args: [name.slice(0, hintCount), dv] });
    }
    hintCount++;
    if (hintCount > maxLetters) this.disabled = true;
  });

  $("btn-reveal").addEventListener("click", function () {
    if (done) return;
    endGame("reveal");
  });

  $("btn-theme").addEventListener("click", function () {
    const next = currentTheme() === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    store.set("bgg-theme", next);
    repaintForTheme();
  });
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", repaintForTheme);
  new MutationObserver(function (muts) {
    for (const m of muts) if (m.attributeName === "data-theme") { repaintForTheme(); break; }
  }).observe(document.documentElement, { attributes: true });

  function repaintForTheme() {
    const dark = currentTheme() === "dark";
    document.querySelector(".ico-moon").style.display = dark ? "none" : "";
    document.querySelector(".ico-sun").style.display = dark ? "" : "none";
    paintAll();
    renderList();
  }

  /* ================= language ================= */
  function applyLangStatic() {
    const t = T();
    document.documentElement.lang = lang;
    $("t-title").textContent = t.title;
    $("t-tag").textContent = t.tag;
    $("btn-guess").textContent = t.guess;
    $("btn-new").textContent = t.newGame;
    $("t-hint").textContent = t.hint;
    $("t-giveup").textContent = t.giveUp;
    $("t-guesses").textContent = t.guesses;
    $("t-closest").textContent = t.closest;
    $("t-far").textContent = t.far;
    $("t-close").textContent = t.close;
    $("t-found").textContent = t.found;
    $("lv-rookie").textContent = t.lvRookie;
    $("lv-novice").textContent = t.lvNovice;
    $("lv-expert").textContent = t.lvExpert;
    $("lv-desc").textContent = t.lvDesc[level];
    $("t-practice").textContent = t.practice;
    $("t-credit").textContent = t.credit;
    $("btn-theme").setAttribute("aria-label", t.themeLabel);
    elMap.setAttribute("aria-label", t.mapAria);
    $("bay-label").textContent = t.bay;
    $("north-label").textContent = t.north;
    $("scale-label").textContent = t.scale;
    document.title = lang === "bn" ? "জেলাখুঁজি — Bangladesh Guesser" : "Bangladesh Guesser — জেলাখুঁজি";
  }

  function applyLangDynamic() {
    elInput.placeholder = done ? T().placeholderDone : T().placeholder;
    renderList();
    renderStats();
    setMsg(lastMsg);
    if (done) showBanner(revealed ? "reveal" : "win");
  }

  function setLang(next) {
    lang = next;
    applyLangStatic();
    applyLangDynamic();
    closeSuggest();
  }

  /* ================= boot ================= */
  buildMap();
  applyLevel();
  setLang(lang);
  repaintForTheme();
  newGame();

  // exposed for tests
  window.__core = { normalize, lev, rank, resolveInput, pairKm, heatColor, bearingDeg, bnNum };
})();
</script>
</body>
</html>
